name: user-service CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the format user-service-vX.Y.Z
        required: true
        type: string

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: L-and-D-Management-System/LnD/.github/workflows/reusable-ci.yaml@main
    with:
      trigger_event: ${{ github.event_name }}
      source_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      service_name: user-service
      image_name: user-service
      dev_manifest_path: gitops/apps/dev/user-app.yaml
      docker_context: .
      dockerfile_path: ./Dockerfile
      working_directory: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      TOKEN: ${{ secrets.GHCR_PAT }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  release:
    if: github.event_name == 'workflow_dispatch'
    uses: L-and-D-Management-System/LnD/.github/workflows/reusable-release.yaml@main
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: user-service
      image_name: user-service
      dev_manifest_path: gitops/apps/dev/user-app.yaml
      prod_manifest_path: gitops/apps/prod/user-app.yaml
    secrets:
      TOKEN: ${{ secrets.GHCR_PAT }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}